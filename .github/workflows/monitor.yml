name: Monitor La Red 106.1

on:
  schedule:
    - cron: '*/5 5-21 * * *'
    - cron: '0 22-23 * * *'
    - cron: '0 0-4 * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    concurrency:
      group: monitor-run
      cancel-in-progress: false

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests python-dotenv

      - name: Ejecutar monitor
        env:
          GREEN_API_INSTANCE_ID: ${{ secrets.GREEN_API_INSTANCE_ID }}
          GREEN_API_TOKEN: ${{ secrets.GREEN_API_TOKEN }}
          WHATSAPP_GROUP_ID: ${{ secrets.WHATSAPP_GROUP_ID }}
        run: python3 monitor.py

      - name: Guardar seen_posts.json
        run: |
          git config user.email "monitor@lared1061.com"
          git config user.name "La Red Monitor Bot"
          git add seen_posts.json
          git diff --staged --quiet || (git pull --rebase origin main && git commit -m "chore: update seen posts [skip ci]" && git push)
