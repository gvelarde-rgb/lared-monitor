name: Monitor La Red 106.1

on:
  schedule:
    - cron: '*/5 5-21 * * *'   # cada 5 min, 5am-9pm UTC (equiv. 11pm-3pm GT aprox)
    - cron: '0 22-23 * * *'    # cada hora entre 10pm-11pm UTC
    - cron: '0 0-4 * * *'      # cada hora entre 12am-4am UTC
  workflow_dispatch:             # permite correrlo manualmente

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 4

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests python-dotenv

      - name: Ejecutar monitor
        env:
          GREEN_API_INSTANCE_ID: ${{ secrets.GREEN_API_INSTANCE_ID }}
          GREEN_API_TOKEN: ${{ secrets.GREEN_API_TOKEN }}
          WHATSAPP_GROUP_ID: ${{ secrets.WHATSAPP_GROUP_ID }}
        run: python3 monitor.py

      - name: Guardar seen_posts.json
        run: |
          git config user.email "monitor@lared1061.com"
          git config user.name "La Red Monitor Bot"
          git add seen_posts.json
          git diff --staged --quiet || git commit -m "chore: update seen posts [skip ci]"
          git push
